<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(to right, #667eea, #764ba2);
            min-height:100vh;
            padding:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:30px;
        }

        input[type="text"]{
            width:350px;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        input[type="submit"]{
            padding:12px 20px;
            background:#4f46e5;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        input[type="submit"]:hover{
            background:#3730a3;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#4f46e5;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f8f9ff;
        }

        tr:hover{
            background:#eef2ff;
        }

        .no-data{
            text-align:center;
            color:#666;
            margin-top:20px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🛒 Product Search</h1>

        <form action="#" method="get">
            <input
                type="text"
                name="search"
                placeholder="Search for products"
            >

            <input type="submit" value="Search">
        </form>

        <table>
            <tr>
                <th>Name</th>
                <th>Price</th>
            </tr>

            {% for i in products %}
            <tr>
                <td>{{ i.name }}</td>
                <td>₹{{ i.price }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No products found</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</body>
</html>
